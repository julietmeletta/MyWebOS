<!DOCTYPE html>
<html>
    <head>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
        <title>Marvel WebOS</title>
        <link rel = "stylesheet" type = "text/css" href = "index.css"/>
    </head>
    <body>
        <div class="top-bar">
        <h1>Marvel WebOS</h1>
        <h1 id="dateElement">Date</h1>
        <h1 id="timeElement">Time</h1>
        </div>
        <div class="welcome">
        <h1>Marvel WebOS</h1>
        <video width=482 height=200 autoplay loop muted>
         <source src="marvelIntro.mp4" type="video/mp4">
         Your browser does not support the video tag.
        </video>
        </div>
        <script>
        function updateTime() {
        var date = new Date().toLocaleString().substring(0,8);
        var time = new Date().toLocaleString().substring(10);
        var dateText = document.querySelector("#dateElement")
        var timeText = document.querySelector("#timeElement");
        dateText.innerHTML = date;
        timeText.innerHTML = time;
        }
        setInterval(updateTime, 1000)
        </script>
    </body>
</html>
