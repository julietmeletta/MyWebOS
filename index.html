<!DOCTYPE html>
<html>
    <head>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
        <title>Marvel WebOS</title>
        <link rel = "stylesheet" type = "text/css" href = "index.css"/>
    </head>
    <body>
        <div id="wallpaper1"></div>
        <div id="wallpaper2"></div>
        <div id="wallpaper3"></div>
        <div id="wallpaper4"></div>
        <div id="top-bar">
        <h1>Marvel WebOS</h1>
        <h1 id="dateElement">Date</h1>
        <h1 id="timeElement">Time</h1>
        </div>
        <div id="desktopApps">
         <div class="desktop-icon" id="welcome-open">Welcome</div>
         <div class="desktop-icon" id="quotes-open">Quote<br>Generator</div>
         <div class="desktop-icon" id="terminal-open">Terminal</div>
         <div class="desktop-icon" id="calc-open">Calculator</div>
        </div>
        <div id="welcome">
        <div id="welcome-header">
            <div id="welcome-close"></div>
        </div>
        <h1>Marvel WebOS</h1>
        <video id="mov" autoplay loop muted>
         <source src="marvelIntro.mp4" type="video/mp4">
         Your browser does not support the video tag.
        </video>
        </div>
        <div id="quotes">
        <div id="quotes-header">
            <div id="quotes-close"></div>
        </div>
        <h1 id="quote"></h1>
        <h2 id="next-quote">Next Quote</h2>
        </div>
        <div id="terminal">
            <div id="terminal-header">
               <div id="terminal-close"></div>
            </div>
            <h1>J.A.R.V.I.S.</h1>
            <div id="log"></div>
            <h2>Enter command:<br>
            > <input id="in"></h2>
        </div>
        <div id="calc">
            <div id="calc-header">
               <div id="calc-close"></div>
            </div>
            <h1 id="result"></h1>
            <div id="buttons">
                <h2 id="delete">⌫</h2><h2 id="C">C</h2><h2 id="%">%</h2><h2 id="divide">÷</h2>
                <h2 id="7">7</h2><h2 id="8">8</h2><h2 id="9">9</h2><h2 id="X">x</h2>
                <h2 id="4">4</h2><h2 id="5">5</h2><h2 id="6">6</h2><h2 id="-">-</h2>
                <h2 id="1">1</h2><h2 id="2">2</h2><h2 id="3">3</h2><h2 id="+">+</h2>
                <h2 id="+/-">+/-</h2><h2 id="0">0</h2><h2 id=".">.</h2><h2 id="=">=</h2>
            </div>
        </div>
        <script src="s.js"></script>
    </body>
</html>
